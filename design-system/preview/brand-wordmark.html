<!doctype html>
<html><head><meta charset="utf-8"><title>Brand wordmark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface); font-family: var(--font-sans); display:flex; gap: 24px; align-items: center; flex-wrap:wrap; }
  .card { border: 1px solid var(--surface-sunk); border-radius: 14px; padding: 24px 28px; display:flex; align-items:center; gap: 16px; }
  .dark { background: #0b1220; border-color: #0b1220; }
  .wm { font-size: 32px; font-weight: 600; letter-spacing: -0.02em; color: var(--ink); }
  .dark .wm { color: white; }
  .square { width: 64px; height: 64px; border-radius: 14px; background: #1f6feb; color: white; display:flex; align-items:center; justify-content:center; font-weight: 700; font-size: 28px; letter-spacing: -0.02em; }
  .small { font-size: 14px; color: var(--ink-muted); font-family: var(--font-mono); }
</style></head>
<body>
  <div class="card"><div class="square">OS</div><div><div class="wm">OpenSignup</div><div class="small">Inter 600 · -0.02em</div></div></div>
  <div class="card dark"><div class="square">OS</div><div class="wm">OpenSignup</div></div>
</body></html>
