<!doctype html>
<html><head><meta charset="utf-8"><title>Colors — Brand</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface); }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; align-items: stretch; }
  .sw { border: 1px solid var(--surface-sunk); border-radius: var(--radius-lg); overflow: hidden; display:flex; flex-direction:column; }
  .chip { height: 80px; }
  .meta { padding: 10px 12px; display: flex; justify-content: space-between; align-items: baseline; }
  .name { font-weight: 600; font-size: 14px; }
  .hex { font-family: var(--font-mono); font-size: 12px; color: var(--ink-muted); }
  .use { padding: 0 12px 10px; font-size: 12px; color: var(--ink-soft); }
  .demo { display:flex; gap:8px; padding: 0 12px 12px; align-items:center; }
  .btn { background: var(--brand); color: white; padding: 8px 14px; border-radius: var(--radius-lg); font-size: 13px; font-weight: 500; }
  .link { color: var(--brand); font-size: 13px; text-decoration: underline; }
</style></head>
<body>
  <div class="row">
    <div class="sw">
      <div class="chip" style="background:#1f6feb"></div>
      <div class="meta"><span class="name">Brand</span><span class="hex">#1f6feb</span></div>
      <div class="use">primary action, focus, links</div>
      <div class="demo"><span class="btn">Sign up</span><a class="link">Edit</a></div>
    </div>
    <div class="sw">
      <div class="chip" style="background:#dbe7ff"></div>
      <div class="meta"><span class="name">Brand soft</span><span class="hex">#dbe7ff</span></div>
      <div class="use">brand-tinted backgrounds</div>
      <div class="demo"><span style="background:#dbe7ff;color:#1f6feb;padding:6px 12px;border-radius:9999px;font-size:12px;font-weight:500">preview</span></div>
    </div>
  </div>
</body></html>
