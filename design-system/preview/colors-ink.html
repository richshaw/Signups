<!doctype html>
<html><head><meta charset="utf-8"><title>Colors — Ink</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface); }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .sw { border: 1px solid var(--surface-sunk); border-radius: var(--radius-lg); overflow: hidden; }
  .chip { height: 64px; }
  .meta { padding: 10px 12px; display: flex; justify-content: space-between; align-items: baseline; }
  .name { font-weight: 600; font-size: 14px; }
  .hex { font-family: var(--font-mono); font-size: 12px; color: var(--ink-muted); }
  .use { padding: 0 12px 10px; font-size: 12px; color: var(--ink-soft); }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#0b1220"></div><div class="meta"><span class="name">Ink</span><span class="hex">#0b1220</span></div><div class="use">body, headings</div></div>
    <div class="sw"><div class="chip" style="background:#5b6474"></div><div class="meta"><span class="name">Ink muted</span><span class="hex">#5b6474</span></div><div class="use">secondary copy</div></div>
    <div class="sw"><div class="chip" style="background:#8a93a4"></div><div class="meta"><span class="name">Ink soft</span><span class="hex">#8a93a4</span></div><div class="use">tertiary, footers</div></div>
  </div>
</body></html>
