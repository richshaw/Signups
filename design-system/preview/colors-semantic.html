<!doctype html>
<html><head><meta charset="utf-8"><title>Colors — Semantic</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface); }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .sw { border: 1px solid var(--surface-sunk); border-radius: var(--radius-lg); overflow: hidden; }
  .chip { height: 56px; display:flex; align-items:center; justify-content:center; }
  .pill { background: rgba(255,255,255,0.18); color: white; padding: 4px 10px; border-radius: 9999px; font-size: 11px; font-weight: 500; }
  .meta { padding: 10px 12px; display: flex; justify-content: space-between; align-items: baseline; }
  .name { font-weight: 600; font-size: 14px; }
  .hex { font-family: var(--font-mono); font-size: 12px; color: var(--ink-muted); }
  .demo { padding: 0 12px 10px; }
  .tag { padding: 3px 10px; border-radius: 9999px; font-size: 11px; font-weight: 500; display:inline-block; }
</style></head>
<body>
  <div class="row">
    <div class="sw">
      <div class="chip" style="background:#1a7f4a"><span class="pill">open</span></div>
      <div class="meta"><span class="name">Success</span><span class="hex">#1a7f4a</span></div>
      <div class="demo"><span class="tag" style="background:rgba(26,127,74,.1);color:#1a7f4a">open</span></div>
    </div>
    <div class="sw">
      <div class="chip" style="background:#b45309"><span class="pill">draft</span></div>
      <div class="meta"><span class="name">Warn</span><span class="hex">#b45309</span></div>
      <div class="demo"><span class="tag" style="background:rgba(180,83,9,.1);color:#b45309">draft</span></div>
    </div>
    <div class="sw">
      <div class="chip" style="background:#be123c"><span class="pill">error</span></div>
      <div class="meta"><span class="name">Danger</span><span class="hex">#be123c</span></div>
      <div class="demo"><span class="tag" style="background:rgba(190,18,60,.1);color:#be123c">error</span></div>
    </div>
  </div>
</body></html>
