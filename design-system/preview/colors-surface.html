<!doctype html>
<html><head><meta charset="utf-8"><title>Colors — Surface</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: #f0f1f4; }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .sw { border: 1px solid var(--surface-sunk); border-radius: var(--radius-lg); overflow: hidden; }
  .chip { height: 64px; border-bottom: 1px solid var(--surface-sunk); }
  .meta { padding: 10px 12px; background: white; display: flex; justify-content: space-between; align-items: baseline; }
  .name { font-weight: 600; font-size: 14px; }
  .hex { font-family: var(--font-mono); font-size: 12px; color: var(--ink-muted); }
  .use { padding: 0 12px 10px; background: white; font-size: 12px; color: var(--ink-soft); }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#ffffff"></div><div class="meta"><span class="name">Surface</span><span class="hex">#ffffff</span></div><div class="use">page bg</div></div>
    <div class="sw"><div class="chip" style="background:#f7f8fa"></div><div class="meta"><span class="name">Raised</span><span class="hex">#f7f8fa</span></div><div class="use">hover, table headers</div></div>
    <div class="sw"><div class="chip" style="background:#eef1f5"></div><div class="meta"><span class="name">Sunk</span><span class="hex">#eef1f5</span></div><div class="use">borders, dividers</div></div>
  </div>
</body></html>
