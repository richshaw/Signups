<!doctype html>
<html><head><meta charset="utf-8"><title>Slot row</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface); font-family: var(--font-sans); }
  .card { background: white; border: 1px solid var(--surface-sunk); border-radius: 14px; overflow: hidden; }
  .row { display:flex; align-items:center; justify-content:space-between; gap: 16px; padding: 16px 20px; border-bottom: 1px solid var(--surface-sunk); }
  .row:last-child { border-bottom: none; }
  .title { font-weight: 500; font-size: 15px; }
  .meta { font-size: 13px; color: var(--ink-muted); }
  .right { display:flex; align-items:center; gap: 12px; }
  .count { font-size: 13px; color: var(--ink-muted); width: 36px; text-align: right; font-variant-numeric: tabular-nums; }
  .action { width: 96px; display: flex; justify-content: center; }
  .btn { background: #1f6feb; color: white; padding: 8px 14px; border-radius: 14px; font-size: 13px; font-weight: 500; border: none; }
  .full { color: var(--ink-muted); padding: 6px 12px; font-size: 12px; font-weight: 500; }
</style></head>
<body>
  <div class="card">
    <div class="row">
      <div><div class="title">Snack — Game 1</div><div class="meta">Tue, Apr 21 · Field B</div></div>
      <div class="right"><span class="count">2/4</span><div class="action"><button class="btn">Sign up</button></div></div>
    </div>
    <div class="row">
      <div><div class="title">Snack — Game 2</div><div class="meta">Sat, Apr 25 · Field B</div></div>
      <div class="right"><span class="count">4/4</span><div class="action"><span class="full">Full</span></div></div>
    </div>
    <div class="row">
      <div><div class="title">Snack — Game 3</div><div class="meta">Tue, Apr 28 · Field B</div></div>
      <div class="right"><span class="count">0/4</span><div class="action"><button class="btn">Sign up</button></div></div>
    </div>
  </div>
</body></html>
