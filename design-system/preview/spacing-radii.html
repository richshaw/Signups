<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing & radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  h4 { margin: 0 0 10px; font-size: 12px; color: var(--ink-soft); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
  .row { display:flex; gap: 10px; align-items: end; }
  .radii { display:flex; gap: 10px; align-items: end; }
  .r { width: 56px; height: 56px; background: var(--brand-soft); border: 1px solid #c1d4ff; display:flex; align-items:flex-end; justify-content:center; font-size: 10px; color: var(--ink-muted); font-family: var(--font-mono); padding: 4px; }
  .sp { background: var(--surface-sunk); }
  .label { font-size: 11px; color: var(--ink-soft); font-family: var(--font-mono); margin-top: 4px; text-align: center; }
  .col { display:flex; flex-direction:column; align-items:center; }
</style></head>
<body>
  <div class="grid">
    <div>
      <h4>Spacing scale (px)</h4>
      <div class="row">
        <div class="col"><div class="sp" style="width:4px;height:32px"></div><div class="label">4</div></div>
        <div class="col"><div class="sp" style="width:8px;height:32px"></div><div class="label">8</div></div>
        <div class="col"><div class="sp" style="width:12px;height:32px"></div><div class="label">12</div></div>
        <div class="col"><div class="sp" style="width:16px;height:32px"></div><div class="label">16</div></div>
        <div class="col"><div class="sp" style="width:20px;height:32px"></div><div class="label">20</div></div>
        <div class="col"><div class="sp" style="width:24px;height:32px"></div><div class="label">24</div></div>
        <div class="col"><div class="sp" style="width:32px;height:32px"></div><div class="label">32</div></div>
      </div>
    </div>
    <div>
      <h4>Border radii</h4>
      <div class="radii">
        <div class="col"><div class="r" style="border-radius:6px">6</div><div class="label">sm</div></div>
        <div class="col"><div class="r" style="border-radius:8px">8</div><div class="label">md</div></div>
        <div class="col"><div class="r" style="border-radius:14px">14</div><div class="label">lg</div></div>
        <div class="col"><div class="r" style="border-radius:18px">18</div><div class="label">xl</div></div>
        <div class="col"><div class="r" style="border-radius:9999px">∞</div><div class="label">full</div></div>
      </div>
    </div>
  </div>
</body></html>
