<!doctype html>
<html><head><meta charset="utf-8"><title>Type — Body & utilities</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface); }
  .row { display: grid; grid-template-columns: 1fr 160px; align-items: baseline; padding: 10px 0; border-bottom: 1px solid var(--surface-sunk); gap: 16px; }
  .row:last-child { border: none; }
  .spec { font-family: var(--font-mono); font-size: 11px; color: var(--ink-soft); }
  .body { font-size: 16px; line-height: 1.5; }
  .small { font-size: 14px; line-height: 1.45; color: var(--ink-muted); }
  .label { font-size: 14px; font-weight: 500; }
  .caption { font-size: 12px; color: var(--ink-soft); }
  .mono { font-family: var(--font-mono); font-size: 13px; background: var(--surface-raised); padding: 2px 6px; border-radius: 6px; }
</style></head>
<body>
  <div class="row"><div class="body">Ad-free, open-source coordination for school parents, coaches, and community organizers.</div><div class="spec">body · 16 / 1.5</div></div>
  <div class="row"><div class="small">Bookmark this link to edit or cancel later.</div><div class="spec">sm muted · 14</div></div>
  <div class="row"><div class="label">Email</div><div class="spec">label · 14 / 500</div></div>
  <div class="row"><div class="caption">v0.1.0 · AGPL-3.0 · Built for real community groups.</div><div class="spec">caption · 12 soft</div></div>
  <div class="row"><div><span class="mono">/s/[slug]</span></div><div class="spec">mono · JetBrains 13</div></div>
</body></html>
