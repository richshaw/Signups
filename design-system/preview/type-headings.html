<!doctype html>
<html><head><meta charset="utf-8"><title>Type — Display & headings</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface); }
  .row { display: flex; align-items: baseline; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--surface-sunk); gap: 16px; }
  .row:last-child { border: none; }
  .spec { font-family: var(--font-mono); font-size: 11px; color: var(--ink-soft); white-space:nowrap; }
  .display { font-size: 48px; line-height: 1.1; letter-spacing: -0.02em; font-weight: 600; color: var(--ink); }
  .h1 { font-size: 30px; line-height: 1.15; letter-spacing: -0.02em; font-weight: 600; }
  .h2 { font-size: 24px; line-height: 1.25; letter-spacing: -0.02em; font-weight: 600; }
  .h3 { font-size: 18px; font-weight: 600; }
</style></head>
<body>
  <div class="row"><div class="display">OpenSignup</div><div class="spec">Inter 600 · 48 / -0.02em</div></div>
  <div class="row"><div class="h1">Your signups</div><div class="spec">h1 · 30 / 600</div></div>
  <div class="row"><div class="h2">Snack duty — Spring season</div><div class="spec">h2 · 24 / 600</div></div>
  <div class="row"><div class="h3">Slots</div><div class="spec">h3 · 18 / 600</div></div>
</body></html>
